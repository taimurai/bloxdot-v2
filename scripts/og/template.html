<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>OG card</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,200..900,0..100&family=Montserrat:wght@300..700&display=swap"/>

<style>
  :root {
    --bd-bone: #F2EDE4;
    --bd-ink: #121212;
    --bd-graphite: #3A3A38;
    --bd-clay: #6B5D47;
    --bd-crimson: #C90D28;
    --rule: rgba(18, 18, 18, 0.18);
    --rule-strong: rgba(18, 18, 18, 0.42);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--bd-bone);
    font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--bd-ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    padding: 64px 80px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: var(--bd-bone);
  }

  /* Subtle paper texture: layered gradients to add warmth without imagery */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(1200px 600px at 100% 0%, rgba(231, 223, 209, 0.55), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, rgba(201, 191, 175, 0.18), transparent 70%);
    pointer-events: none;
  }

  .card > * { position: relative; }

  /* Top: wordmark + hairline */
  .top {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .wordmark {
    height: 28px;
    width: auto;
    display: block;
  }
  .top-rule {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* Middle: title + tagline */
  .body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 0 32px;
  }

  .title {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 20, "WONK" 0;
    font-weight: 300;
    font-size: 116px;
    line-height: 0.96;
    letter-spacing: -0.035em;
    text-transform: lowercase;
    color: var(--bd-ink);
    text-wrap: balance;
    max-width: 1000px;
  }
  .title.long {
    font-size: 92px;
  }
  .title.short {
    font-size: 132px;
  }

  .title .dot {
    color: var(--bd-crimson);
  }

  .tagline {
    margin-top: 28px;
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "opsz" 30, "SOFT" 50;
    font-weight: 320;
    font-style: italic;
    font-size: 26px;
    line-height: 1.4;
    color: var(--bd-graphite);
    max-width: 720px;
    letter-spacing: -0.005em;
  }

  /* Bottom: rule + meta row */
  .bottom {
    display: grid;
    grid-template-rows: 1px auto;
    gap: 18px;
  }
  .bottom-rule {
    height: 1px;
    background: var(--rule);
  }
  .meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Montserrat', system-ui, sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--bd-clay);
  }
  .meta-num {
    font-weight: 500;
  }
  .meta-num .num {
    color: var(--bd-ink);
    font-weight: 600;
  }
  .meta-url {
    font-weight: 500;
  }
  .meta-url .dot-url {
    color: var(--bd-crimson);
  }
</style>
</head>

<body>
  <div class="card">
    <div class="top">
      <!-- BloxDot wordmark, scaled to 28px height -->
      <svg class="wordmark" viewBox="0 0 126 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M36.411 26.622H53.8498V31.2869H30.8359V0.183594H36.411V26.6239V26.622Z" fill="#121212"></path>
        <path d="M54.3652 15.7352C54.3652 6.61219 60.6815 0.181641 69.6784 0.181641C78.6753 0.181641 84.9916 6.61219 84.9916 15.7352C84.9916 24.8582 78.6753 31.2869 69.6784 31.2869C60.6815 31.2869 54.3652 24.8563 54.3652 15.7352ZM79.2499 15.7352C79.2499 9.22998 75.3064 4.66847 69.6784 4.66847C64.0504 4.66847 60.1069 9.22998 60.1069 15.7352C60.1069 22.2404 64.0504 26.802 69.6784 26.802C75.3064 26.802 79.2499 22.2404 79.2499 15.7352Z" fill="#121212"></path>
        <path d="M98.0014 20.2853L91.0341 31.2888H84.4648L94.7364 15.1148L85.261 0.183594H91.791L98.3994 10.5648L105.008 0.183594H111.538L101.664 15.7372L111.538 31.2907H104.969L98.0014 20.2872V20.2853Z" fill="#121212"></path>
        <path d="M120.295 31.2892C123.26 31.2892 125.664 28.9418 125.664 26.046C125.664 23.1502 123.26 20.8027 120.295 20.8027C117.33 20.8027 114.926 23.1502 114.926 26.046C114.926 28.9418 117.33 31.2892 120.295 31.2892Z" fill="#C90D28"></path>
        <path d="M24.4395 15.3353C26.2828 13.7707 27.1633 11.58 27.1633 8.84152C27.1633 3.16931 23.1982 0 16.1054 0H0V7.08164C0 8.99281 1.58642 10.542 3.54346 10.542H4.80632V4.69365H16.1034C19.3488 4.69365 21.151 6.17968 21.151 8.84152C21.151 11.5034 19.3488 13.0277 16.1034 13.0277H11.2167C4.00625 13.0277 0 16.6662 0 23.2001V31.2986H16.9055C23.7159 31.2986 27.9634 27.8555 27.9634 22.1833C27.9634 19.2495 26.8417 16.9017 24.4375 15.3372L24.4395 15.3353ZM16.9074 26.6031H5.61032V23.2001C5.61032 20.1745 8.12231 17.7233 11.2187 17.7233H16.9074C20.1528 17.7233 21.955 19.328 21.955 22.1833C21.955 25.0385 20.1528 26.605 16.9074 26.605V26.6031Z" fill="#121212"></path>
      </svg>
      <div class="top-rule"></div>
    </div>

    <div class="body">
      <h1 class="title" id="title">architecture<span class="dot">.</span></h1>
      <p class="tagline" id="tagline">One team in Lahore. Since 2023.</p>
    </div>

    <div class="bottom">
      <div class="bottom-rule"></div>
      <div class="meta">
        <span class="meta-num"><span class="num" id="num">01</span> &nbsp;·&nbsp; <span id="label">architecture</span></span>
        <span class="meta-url">bloxdot<span class="dot-url">.</span>com</span>
      </div>
    </div>
  </div>
</body>
</html>
